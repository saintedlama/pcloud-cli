name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: GoShip
        uses: saintedlama/goship@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
